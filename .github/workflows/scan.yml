name: Ioanna SBOM and Vulnerability Scan

on:
  workflow_dispatch:
    inputs:
      docker_image:
        description: "Docker image to scan"
        required: true
        default: "ghcr.io/iwannaorph/hw0_devsecops:latest"

jobs:
  security-scan:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Authenticate to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image from GHCR
        run: docker pull ${{ github.event.inputs.docker_image }}

      - name: Run CVE analysis with Docker Scout
        uses: docker/scout-action@v1
        with:
          command: cves
          image: ${{ github.event.inputs.docker_image }}
          sarif-file: ioanna_scan_results.sarif
          exit-code: false

      - name: Generate SBOM (SPDX format)
        uses: docker/scout-action@v1
        with:
          command: sbom
          image: ${{ github.event.inputs.docker_image }}
          output: ioanna_sbom.spdx.json
          format: spdx

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: ioanna_sbom.spdx.json
          path: ioanna_sbom.spdx.json

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: ioanna_scan_results.sarif
          path: ioanna_scan_results.sarif

      - name: Upload SARIF to GitHub Security Dashboard
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ioanna_scan_results.sarif
          category: Ioanna-SCA